<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>உஸ்மானியா · தஹஜ்ஜுத்</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(135deg, #0d3329 0%, #051a14 100%);
            font-family: 'Tajawal', sans-serif;
            min-height: 100vh;
            padding: 1rem;
            color: #f5e6c8;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        .header {
            background: linear-gradient(145deg, #1a4d3d, #0f2e25);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 2px solid #c9a227;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        .header h1 {
            color: #f0c674;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .year-badge {
            background: #c9a227;
            color: #1a2f1a;
            padding: 0.5rem 1.5rem;
            border-radius: 25px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .year-badge:hover {
            background: #f0c674;
            transform: scale(1.05);
        }

        .edit-icon {
            font-size: 0.8rem;
        }

        /* JSON Buttons */
        .json-bar {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .json-btn {
            padding: 0.8rem 1.5rem;
            border-radius: 25px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .json-btn:hover { transform: scale(1.05); }

        .json-export {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
        }

        .json-import {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            position: relative;
        }

        .json-import input {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .months-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .month-card {
            background: #143d32;
            border: 2px solid #b8941d;
            border-radius: 15px;
            padding: 1.5rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .month-card:hover { transform: translateY(-5px); background: #1a4d3d; }
        .month-card.active { background: #1e5c4a; border-color: #f0c674; box-shadow: 0 0 20px rgba(240,198,116,0.3); }

        .month-card i { font-size: 2rem; color: #f0c674; margin-bottom: 0.5rem; }
        .month-card .month-name { font-weight: bold; font-size: 1.1rem; }

        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.3s; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #143d32;
            padding: 1rem 1.5rem;
            border-radius: 15px;
            margin-bottom: 1.5rem;
            border: 2px solid #b8941d;
        }

        .btn {
            background: #c9a227;
            color: #0d3329;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
            transition: all 0.2s;
        }

        .btn:hover { background: #f0c674; transform: scale(1.05); }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 0.8rem;
        }

        .day-card {
            background: #1a4d3d;
            border: 2px solid #b8941d;
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .day-card:hover { background: #236b54; }
        .day-card.active { background: #2d8568; border-color: #f0c674; }

        .day-number { font-size: 1.8rem; font-weight: bold; color: #f0c674; }
        .day-week { font-size: 0.85rem; opacity: 0.8; margin-top: 0.3rem; }

        .jumra-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
        }

        .jumra-card {
            background: #1a4d3d;
            border: 3px solid #c9a227;
            border-radius: 20px;
            padding: 2rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .jumra-card:hover { transform: translateY(-5px); }
        .jumra-card.active { background: #236b54; box-shadow: 0 0 25px rgba(201,162,39,0.4); }

        .jumra-number { font-size: 3rem; font-weight: bold; color: #f0c674; }
        .jumra-name { font-size: 1.1rem; margin: 0.5rem 0; }
        .student-count { background: #0d3329; padding: 0.3rem 1rem; border-radius: 15px; font-size: 0.9rem; }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-box {
            background: #143d32;
            border: 2px solid #b8941d;
            border-radius: 15px;
            padding: 1rem;
            text-align: center;
        }

        .stat-box i { color: #f0c674; font-size: 1.5rem; margin-bottom: 0.5rem; }
        .stat-value { font-size: 1.5rem; font-weight: bold; color: #f0c674; }

        .toolbar {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
            background: #143d32;
            padding: 1rem;
            border-radius: 15px;
            border: 2px solid #b8941d;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            background: #0d3329;
            border: 2px solid #b8941d;
            border-radius: 25px;
            padding: 0.7rem 1.2rem;
            color: #f5e6c8;
            font-family: inherit;
        }

        .table-container {
            background: #143d32;
            border: 3px solid #b8941d;
            border-radius: 20px;
            padding: 1rem;
            overflow-x: auto;
        }

        table { width: 100%; border-collapse: collapse; }
        
        th {
            background: #1a4d3d;
            padding: 0.8rem 0.5rem;
            border: 2px solid #b8941d;
            border-radius: 10px;
            color: #f0c674;
        }

        td {
            background: #1e5c4a;
            padding: 0.6rem 0.4rem;
            border: 2px solid #b8941d;
            border-radius: 8px;
            text-align: center;
        }

        .student-name {
            text-align: left;
            padding-left: 1rem;
            font-weight: 600;
            cursor: pointer;
        }

        .prayer-btn {
            width: 35px;
            height: 35px;
            border-radius: 8px;
            border: 2px solid #c9a227;
            background: #143d32;
            color: white;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .prayer-btn.prayed { background: #27ae60; }
        .prayer-btn.missed { background: #e74c3c; }
        .prayer-btn.partial { background: #f39c12; }

        .amount { font-weight: bold; }
        .amount.positive { color: #2ecc71; }
        .amount.negative { color: #e74c3c; }

        .delete-btn {
            background: transparent;
            border: none;
            color: #e74c3c;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.active { display: flex; }

        .modal-box {
            background: linear-gradient(145deg, #1a4d3d, #0f2e25);
            border: 3px solid #c9a227;
            border-radius: 25px;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .modal-title { color: #f0c674; margin-bottom: 1.5rem; font-size: 1.3rem; }

        .prayer-options {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin: 1.5rem 0;
        }

        .prayer-option {
            background: #143d32;
            border: 3px solid #b8941d;
            border-radius: 15px;
            padding: 1rem;
            min-width: 100px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .prayer-option:hover { background: #1e5c4a; transform: scale(1.05); }

        .prayer-option .icon { font-size: 2rem; margin-bottom: 0.5rem; }

        .input-field {
            width: 100%;
            background: #0d3329;
            border: 2px solid #b8941d;
            border-radius: 10px;
            padding: 0.8rem;
            color: #f5e6c8;
            font-family: inherit;
            margin: 1rem 0;
        }

        .hidden { display: none !important; }

        @media (max-width: 768px) {
            .header h1 { font-size: 1.5rem; }
            .months-grid { grid-template-columns: repeat(2, 1fr); }
            .stats-bar { grid-template-columns: repeat(2, 1fr); }
            .toolbar { flex-direction: column; }
            .json-bar { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1><i class="fas fa-mosque"></i> உஸ்மானிய அரபிக் கல்லூரி</h1>
            <span class="year-badge" onclick="app.openYearModal()">
                <span id="yearDisplay">2026 - 2027</span>
                <i class="fas fa-pen edit-icon"></i>
            </span>
        </div>

        <!-- JSON Export/Import -->
        <div class="json-bar">
            <button class="json-btn json-export" onclick="app.exportToJSON()">
                <i class="fas fa-download"></i> JSON Export
            </button>
            <label class="json-btn json-import">
                <i class="fas fa-upload"></i> JSON Import
                <input type="file" accept=".json" onchange="app.importFromJSON(this)">
            </label>
        </div>

        <!-- Months -->
        <div id="monthsSection" class="section active">
            <div class="months-grid" id="monthsGrid"></div>
        </div>

        <!-- Days -->
        <div id="daysSection" class="section">
            <div class="section-header">
                <h2 id="daysTitle"></h2>
                <button class="btn" onclick="app.showMonths()"><i class="fas fa-arrow-left"></i> மாதங்கள்</button>
            </div>
            <div class="days-grid" id="daysGrid"></div>
        </div>

        <!-- Jumra -->
        <div id="jumraSection" class="section">
            <div class="section-header">
                <h2 id="jumraTitle"></h2>
                <button class="btn" onclick="app.showDays()"><i class="fas fa-arrow-left"></i> நாட்கள்</button>
            </div>
            <div class="jumra-grid" id="jumraGrid"></div>
        </div>

        <!-- Students Table -->
        <div id="studentsSection" class="section">
            <div class="section-header">
                <h2>📊 மாணவர் விவரங்கள்</h2>
                <button class="btn" onclick="app.showJumras()"><i class="fas fa-arrow-left"></i> ஜும்ரா</button>
            </div>

            <div class="stats-bar">
                <div class="stat-box">
                    <i class="fas fa-calendar"></i>
                    <div class="stat-value" id="statDate">-</div>
                    <div>தேதி</div>
                </div>
                <div class="stat-box">
                    <i class="fas fa-moon"></i>
                    <div class="stat-value" id="statJumra">-</div>
                    <div>ஜும்ரா</div>
                </div>
                <div class="stat-box">
                    <i class="fas fa-coins"></i>
                    <div class="stat-value" id="statTotal">₹0</div>
                    <div>மொத்தம்</div>
                </div>
                <div class="stat-box">
                    <i class="fas fa-crown"></i>
                    <div class="stat-value" id="statPerfect">0</div>
                    <div>சிறந்த</div>
                </div>
                <div class="stat-box">
                    <i class="fas fa-users"></i>
                    <div class="stat-value" id="statCount">0</div>
                    <div>மாணவர்</div>
                </div>
            </div>

            <div class="toolbar">
                <input type="text" class="search-box" id="searchInput" placeholder="🔍 பெயர் தேடு..." oninput="app.renderStudents()">
                <button class="btn" onclick="app.addStudent()"><i class="fas fa-plus"></i> சேர்</button>
                <button class="btn" onclick="app.saveData()"><i class="fas fa-save"></i> சேமி</button>
                <button class="btn" onclick="app.editNames()"><i class="fas fa-pen"></i> பெயர்கள்</button>
                <button class="btn" onclick="app.resetData()"><i class="fas fa-undo"></i> மீட்டமை</button>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>மாணவர்</th>
                            <th>ஃபஜ்ர்</th>
                            <th>ஸுஹ்ர்</th>
                            <th>அஸ்ர்</th>
                            <th>மக்ரிப்</th>
                            <th>இஷா</th>
                            <th>தஹஜ்ஜுத்</th>
                            <th>₹</th>
                            <th>❌</th>
                        </tr>
                    </thead>
                    <tbody id="studentsTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Year Edit Modal -->
    <div class="modal-overlay" id="yearModal">
        <div class="modal-box">
            <h3 class="modal-title">📅 வருடத்தை மாற்று</h3>
            <input type="text" class="input-field" id="yearInput" placeholder="எ.கா: 2026 - 2027">
            <div style="display:flex; gap:1rem; justify-content:center;">
                <button class="btn" onclick="app.saveYear()">சேமி</button>
                <button class="btn" onclick="app.closeYearModal()">ரத்து</button>
            </div>
        </div>
    </div>

    <!-- Prayer Status Modal -->
    <div class="modal-overlay" id="prayerModal">
        <div class="modal-box">
            <h3 class="modal-title" id="modalTitle"></h3>
            <div class="prayer-options">
                <div class="prayer-option" onclick="app.setPrayer('prayed')">
                    <div class="icon">✅</div>
                    <div>தொழுதார்</div>
                </div>
                <div class="prayer-option" onclick="app.setPrayer('missed')">
                    <div class="icon">❌</div>
                    <div>வரவில்லை</div>
                </div>
                <div class="prayer-option" onclick="app.setPrayer('partial')">
                    <div class="icon">◐</div>
                    <div>ஒரு ரக்அத்</div>
                </div>
            </div>
            <button class="btn" onclick="app.closeModal()">மூடு</button>
        </div>
    </div>

    <!-- Name Edit Modal -->
    <div class="modal-overlay" id="nameModal">
        <div class="modal-box">
            <h3 class="modal-title">பெயர் மாற்று</h3>
            <input type="text" class="input-field" id="nameInput">
            <div style="display:flex; gap:1rem; justify-content:center;">
                <button class="btn" onclick="app.saveName()">சேமி</button>
                <button class="btn" onclick="app.closeNameModal()">ரத்து</button>
            </div>
        </div>
    </div>

    <!-- Edit All Names Modal -->
    <div class="modal-overlay" id="editAllModal">
        <div class="modal-box" style="max-width:500px; max-height:80vh; overflow-y:auto;">
            <h3 class="modal-title">அனைத்து பெயர்கள்</h3>
            <div id="allNamesList"></div>
            <div style="display:flex; gap:1rem; justify-content:center; margin-top:1rem;">
                <button class="btn" onclick="app.saveAllNames()">சேமி</button>
                <button class="btn" onclick="app.closeEditAllModal()">மூடு</button>
            </div>
        </div>
    </div>

    <script>
        const app = (function() {
            // Data
            let currentYear = "2026 - 2027";
            
            const months = [
                { name: 'மார்ச் 26', days: 31, start: 0 },
                { name: 'ஏப்ரல் 26', days: 30, start: 3 },
                { name: 'மே 26', days: 31, start: 5 },
                { name: 'ஜூன் 26', days: 30, start: 1 },
                { name: 'ஜூலை 26', days: 31, start: 3 },
                { name: 'ஆகஸ்ட் 26', days: 31, start: 6 },
                { name: 'செப் 26', days: 30, start: 2 },
                { name: 'அக்டோ 26', days: 31, start: 4 },
                { name: 'நவ 26', days: 30, start: 0 },
                { name: 'டிச 26', days: 31, start: 2 },
                { name: 'ஜன 27', days: 31, start: 5 },
                { name: 'பிப் 27', days: 28, start: 1 },
                { name: 'மார்ச் 27', days: 31, start: 1 }
            ];

            const weekDays = ['ஞா', 'தி', 'செ', 'பு', 'வி', 'வெ', 'சனி'];
            const jumraNames = ['முதல்', 'இரண்டாம்', 'மூன்றாம்', 'நான்காம்', 'ஐந்தாம்'];
            const prayerNames = ['ஃபஜ்ர்', 'ஸுஹ்ர்', 'அஸ்ர்', 'மக்ரிப்', 'இஷா', 'தஹஜ்ஜுத்'];

            const defaultNames = [
                "அஹமது பாஷா", "முஹம்மது அலி", "அப்துல் ரஹ்மான்", "சித்தீக்", "ஹசன்",
                "யூசுப்", "இப்ராஹிம்", "உமர்", "உஸ்மான்", "அலி",
                "பிலால்", "அபூபக்கர்", "காலித்", "அம்ர்", "சல்மான்",
                "அபூஹுரைரா", "அப்துல்லாஹ்", "ஜாபிர்", "அனஸ்", "சுஹைப்",
                "அபூதர்", "மிஸ்அப்", "ஸைத்", "அப்துர் ரஸாக்", "முஹம்மது யூசுப்",
                "அப்துல் காதிர்", "இஸ்மாயில்", "ஹசன் பஷா", "இப்ராஹிம் அலி", "அப்துல் லத்தீப்"
            ];

            let current = { month: null, day: null, jumra: null };
            let data = {};
            let editing = { student: null, prayer: null, nameStudent: null };

            function init() {
                loadYear();
                loadData();
                renderMonths();
            }

            function loadYear() {
                const saved = localStorage.getItem('usmaiya_year');
                if (saved) {
                    currentYear = saved;
                    document.getElementById('yearDisplay').textContent = currentYear;
                }
            }

            function saveYearToStorage() {
                localStorage.setItem('usmaiya_year', currentYear);
                document.getElementById('yearDisplay').textContent = currentYear;
            }

            function loadData() {
                const saved = localStorage.getItem('usmaiya_v2');
                if (saved) {
                    data = JSON.parse(saved);
                } else {
                    createDefaultData();
                }
            }

            function createDefaultData() {
                data = {};
                months.forEach((m, mi) => {
                    data[mi] = {};
                    for (let d = 1; d <= m.days; d++) {
                        data[mi][d] = {};
                        for (let j = 0; j < 5; j++) {
                            const count = j === 4 ? 35 : 30;
                            data[mi][d][j] = [];
                            for (let i = 1; i <= count; i++) {
                                data[mi][d][j].push({
                                    id: i,
                                    name: defaultNames[i - 1] || `மாணவர் ${i}`,
                                    p: [null, null, null, null, null, null]
                                });
                            }
                        }
                    }
                });
                saveData();
            }

            function saveData() {
                try {
                    const json = JSON.stringify(data);
                    localStorage.setItem('usmaiya_v2', json);
                    showToast(`சேமிக்கப்பட்டது (${(json.length/1024).toFixed(1)} KB)`);
                    return true;
                } catch (e) {
                    alert('சேமிப்பில் பிழை: ' + e.message);
                    return false;
                }
            }

            // ========== YEAR EDIT ==========
            function openYearModal() {
                document.getElementById('yearInput').value = currentYear;
                document.getElementById('yearModal').classList.add('active');
            }

            function closeYearModal() {
                document.getElementById('yearModal').classList.remove('active');
            }

            function saveYear() {
                const newYear = document.getElementById('yearInput').value.trim();
                if (!newYear) {
                    alert('வருடத்தை உள்ளிடவும்!');
                    return;
                }
                currentYear = newYear;
                saveYearToStorage();
                closeYearModal();
                showToast(`✅ வருடம் மாற்றப்பட்டது: ${currentYear}`);
            }

            // ========== JSON EXPORT/IMPORT ==========
            function exportToJSON() {
                const exportData = {
                    app: 'உஸ்மானியா - தஹஜ்ஜுத் Tracker',
                    version: '2.0',
                    year: currentYear,
                    exportedAt: new Date().toISOString(),
                    months: months,
                    data: data
                };
                
                const jsonString = JSON.stringify(exportData, null, 2);
                const blob = new Blob([jsonString], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = url;
                a.download = `usmaiya_${currentYear.replace(/\s/g, '_')}_${new Date().toISOString().split('T')[0]}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                showToast(`✅ Exported! (${(jsonString.length/1024).toFixed(1)} KB)`);
            }

            function importFromJSON(input) {
                const file = input.files[0];
                if (!file) return;
                
                if (!file.name.endsWith('.json')) {
                    alert('❌ JSON file மட்டுமே ஏற்றுக்கொள்ளப்படும்!');
                    input.value = '';
                    return;
                }
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const importData = JSON.parse(e.target.result);
                        
                        // Validate structure
                        if (!importData.data || typeof importData.data !== 'object') {
                            throw new Error('Invalid: data object not found');
                        }
                        
                        // Import year if available
                        if (importData.year) {
                            currentYear = importData.year;
                            saveYearToStorage();
                        }
                        
                        // Validate months count
                        const monthKeys = Object.keys(importData.data);
                        if (monthKeys.length !== 13) {
                            throw new Error(`Expected 13 months, found ${monthKeys.length}`);
                        }
                        
                        if (confirm(`📥 Import செய்யவா?\n\n✓ Year: ${importData.year || 'Unknown'}\n✓ Exported: ${importData.exportedAt ? new Date(importData.exportedAt).toLocaleString('ta-IN') : 'Unknown'}\n✓ Months: ${monthKeys.length}\n\n⚠️ Current data REPLACE ஆகும்!`)) {
                            
                            data = importData.data;
                            saveData();
                            
                            // Reset view
                            current = { month: null, day: null, jumra: null };
                            showSection('monthsSection');
                            renderMonths();
                            
                            showToast(`✅ ${monthKeys.length} months imported!`);
                        }
                    } catch (err) {
                        alert('❌ Error: ' + err.message);
                    }
                    input.value = '';
                };
                
                reader.onerror = () => {
                    alert('❌ File read error');
                    input.value = '';
                };
                
                reader.readAsText(file);
            }

            function showToast(msg) {
                const div = document.createElement('div');
                div.style.cssText = 'position:fixed; top:20px; right:20px; background:#c9a227; color:#0d3329; padding:1rem 1.5rem; border-radius:10px; font-weight:bold; z-index:9999; animation:fadeIn 0.3s;';
                div.textContent = msg;
                document.body.appendChild(div);
                setTimeout(() => div.remove(), 3000);
            }

            // Navigation
            function renderMonths() {
                const grid = document.getElementById('monthsGrid');
                grid.innerHTML = '';
                months.forEach((m, i) => {
                    const div = document.createElement('div');
                    div.className = `month-card ${current.month === i ? 'active' : ''}`;
                    div.innerHTML = `<i class="fas fa-calendar"></i><div class="month-name">${m.name}</div><div style="font-size:0.9rem; opacity:0.8;">${m.days} நாட்கள்</div>`;
                    div.onclick = () => selectMonth(i);
                    grid.appendChild(div);
                });
            }

            function selectMonth(i) {
                current.month = i;
                current.day = null;
                current.jumra = null;
                showSection('daysSection');
                renderDays();
            }

            function renderDays() {
                const m = months[current.month];
                document.getElementById('daysTitle').innerHTML = `<i class="fas fa-calendar-day"></i> ${m.name}`;
                
                const grid = document.getElementById('daysGrid');
                grid.innerHTML = '';
                
                for (let d = 1; d <= m.days; d++) {
                    const wd = weekDays[(m.start + d - 1) % 7];
                    const div = document.createElement('div');
                    div.className = `day-card ${current.day === d ? 'active' : ''}`;
                    div.innerHTML = `<div class="day-number">${d}</div><div class="day-week">${wd}</div>`;
                    div.onclick = () => selectDay(d);
                    grid.appendChild(div);
                }
            }

            function selectDay(d) {
                current.day = d;
                current.jumra = null;
                showSection('jumraSection');
                renderJumras();
            }

            function renderJumras() {
                const m = months[current.month];
                document.getElementById('jumraTitle').innerHTML = `<i class="fas fa-star"></i> ${m.name} - ${current.day}`;
                
                const grid = document.getElementById('jumraGrid');
                grid.innerHTML = '';
                
                jumraNames.forEach((name, i) => {
                    const students = data[current.month][current.day][i];
                    const div = document.createElement('div');
                    div.className = `jumra-card ${current.jumra === i ? 'active' : ''}`;
                    div.innerHTML = `
                        <div class="jumra-number">${i + 1}</div>
                        <div class="jumra-name">${name} ஜும்ரா</div>
                        <span class="student-count"><i class="fas fa-user"></i> ${students.length}</span>
                    `;
                    div.onclick = () => selectJumra(i);
                    grid.appendChild(div);
                });
            }

            function selectJumra(j) {
                current.jumra = j;
                showSection('studentsSection');
                renderStudents();
            }

            function showSection(id) {
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                document.getElementById(id).classList.add('active');
            }

            // Students
            function renderStudents() {
                const students = data[current.month][current.day][current.jumra];
                const search = document.getElementById('searchInput').value.toLowerCase();
                
                // Stats
                let total = 0, perfect = 0;
                students.forEach(s => {
                    total += calculateAmount(s);
                    if (s.p.every(v => v === 'prayed')) perfect++;
                });
                
                document.getElementById('statDate').textContent = `${months[current.month].name} ${current.day}`;
                document.getElementById('statJumra').textContent = jumraNames[current.jumra];
                document.getElementById('statTotal').textContent = `₹${total}`;
                document.getElementById('statPerfect').textContent = perfect;
                document.getElementById('statCount').textContent = students.length;
                
                // Table
                const tbody = document.getElementById('studentsTable');
                tbody.innerHTML = '';
                
                students.forEach(s => {
                    if (search && !s.name.toLowerCase().includes(search)) return;
                    
                    const amount = calculateAmount(s);
                    const row = document.createElement('tr');
                    
                    let cells = `<td style="color:#f0c674; font-weight:bold;">${s.id}</td>`;
                    cells += `<td class="student-name" onclick="app.openNameModal(${s.id})">${s.name}</td>`;
                    
                    s.p.forEach((status, pi) => {
                        const cls = status || '';
                        const icon = status === 'prayed' ? '✓' : status === 'missed' ? '✕' : status === 'partial' ? '◐' : '○';
                        cells += `<td><button class="prayer-btn ${cls}" onclick="app.openPrayerModal(${s.id}, ${pi})">${icon}</button></td>`;
                    });
                    
                    cells += `<td class="amount ${amount > 0 ? 'positive' : 'negative'}">₹${amount}</td>`;
                    cells += `<td><button class="delete-btn" onclick="app.deleteStudent(${s.id})"><i class="fas fa-trash"></i></button></td>`;
                    
                    row.innerHTML = cells;
                    tbody.appendChild(row);
                });
            }

            function calculateAmount(s) {
                let missed = 0, partial = 0;
                s.p.forEach(v => {
                    if (v === 'missed') missed++;
                    else if (v === 'partial') partial++;
                });
                return Math.max(0, 50 - (missed * 8) - (partial * 4));
            }

            // Actions
            function addStudent() {
                const students = data[current.month][current.day][current.jumra];
                const newId = students.length + 1;
                students.push({
                    id: newId,
                    name: `மாணவர் ${newId}`,
                    p: [null, null, null, null, null, null]
                });
                saveData();
                renderStudents();
            }

            function deleteStudent(id) {
                if (!confirm('நீக்கவா?')) return;
                let students = data[current.month][current.day][current.jumra];
                students = students.filter(s => s.id !== id);
                students.forEach((s, i) => s.id = i + 1);
                data[current.month][current.day][current.jumra] = students;
                saveData();
                renderStudents();
            }

            // Modals
            function openPrayerModal(sid, pid) {
                editing.student = sid;
                editing.prayer = pid;
                const s = data[current.month][current.day][current.jumra].find(x => x.id === sid);
                document.getElementById('modalTitle').textContent = `${s.name} - ${prayerNames[pid]}`;
                document.getElementById('prayerModal').classList.add('active');
            }

            function setPrayer(status) {
                const s = data[current.month][current.day][current.jumra].find(x => x.id === editing.student);
                if (s) {
                    s.p[editing.prayer] = status;
                    saveData();
                    renderStudents();
                }
                closeModal();
            }

            function closeModal() {
                document.getElementById('prayerModal').classList.remove('active');
                editing.student = null;
                editing.prayer = null;
            }

            function openNameModal(sid) {
                editing.nameStudent = sid;
                const s = data[current.month][current.day][current.jumra].find(x => x.id === sid);
                document.getElementById('nameInput').value = s.name;
                document.getElementById('nameModal').classList.add('active');
            }

            function saveName() {
                const name = document.getElementById('nameInput').value.trim();
                if (!name) return;
                const s = data[current.month][current.day][current.jumra].find(x => x.id === editing.nameStudent);
                if (s) {
                    s.name = name;
                    saveData();
                    renderStudents();
                }
                closeNameModal();
            }

            function closeNameModal() {
                document.getElementById('nameModal').classList.remove('active');
                editing.nameStudent = null;
            }

            function editNames() {
                const container = document.getElementById('allNamesList');
                container.innerHTML = '';
                const students = data[current.month][current.day][current.jumra];
                
                students.forEach(s => {
                    const div = document.createElement('div');
                    div.style.marginBottom = '10px';
                    div.innerHTML = `
                        <div style="color:#f0c674; font-size:0.85rem; margin-bottom:3px;">${s.id}.</div>
                        <input type="text" class="input-field" id="name-${s.id}" value="${s.name}" style="margin:0;">
                    `;
                    container.appendChild(div);
                });
                
                document.getElementById('editAllModal').classList.add('active');
            }

            function saveAllNames() {
                const students = data[current.month][current.day][current.jumra];
                students.forEach(s => {
                    const input = document.getElementById(`name-${s.id}`);
                    if (input && input.value.trim()) {
                        s.name = input.value.trim();
                    }
                });
                saveData();
                renderStudents();
                closeEditAllModal();
            }

            function closeEditAllModal() {
                document.getElementById('editAllModal').classList.remove('active');
            }

            function resetData() {
                if (!confirm('அனைத்து தொழுகை பதிவுகளும் அழியும்! நிச்சயமாக?')) return;
                const count = current.jumra === 4 ? 35 : 30;
                const students = [];
                for (let i = 1; i <= count; i++) {
                    students.push({
                        id: i,
                        name: defaultNames[i - 1] || `மாணவர் ${i}`,
                        p: [null, null, null, null, null, null]
                    });
                }
                data[current.month][current.day][current.jumra] = students;
                saveData();
                renderStudents();
            }

            // Public API
            return {
                init,
                openYearModal,
                closeYearModal,
                saveYear,
                exportToJSON,
                importFromJSON,
                showMonths: () => { current.month = null; showSection('monthsSection'); renderMonths(); },
                showDays: () => { current.jumra = null; showSection('daysSection'); renderDays(); },
                showJumras: () => { current.jumra = null; showSection('jumraSection'); renderJumras(); },
                renderStudents,
                addStudent,
                deleteStudent,
                openPrayerModal,
                setPrayer,
                closeModal,
                openNameModal,
                saveName,
                closeNameModal,
                editNames,
                saveAllNames,
                closeEditAllModal,
                resetData,
                saveData
            };
        })();

        // Start
        document.addEventListener('DOMContentLoaded', app.init);

        // Close modals on outside click
        document.querySelectorAll('.modal-overlay').forEach(m => {
            m.addEventListener('click', (e) => {
                if (e.target === m) m.classList.remove('active');
            });
        });
    </script>
</body>
</html>
